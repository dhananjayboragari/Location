<!DOCTYPE html>
<html>
<head>
  <title>Fast Sheet Table (CSV)</title>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

  <!-- DataTables -->
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
body {
  font-family: Arial;
  margin: 0;
}

/* â CARD */
.card {
  position: sticky;
  top: 0;
  background: white;
  padding: 12px 15px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  z-index: 1000;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#search {
  padding: 8px;
  width: 250px;
}

/* â TABLE */
.table-container {
  overflow-x: auto;
  padding: 15px;
  display: none;
}

table {
  width: 100%;
  border-collapse: collapse;
  border: 1px solid #ccc; /* â outer border */
}

/* â HEADER */
thead th {
  background: #f2f2f2;
  position: sticky;
  top: 55px;
  z-index: 2;
  border: 1px solid #ccc; /* â header border */
  padding: 8px;
}

/* â BODY CELL */
tbody td {
  border: 1px solid #ddd; /* â cell border */
  padding: 8px;
}

/* â HOVER EFFECT */
tbody tr:hover {
  background-color: #f9f9f9; /* â row hover */
  cursor: pointer;
}

/* â ALTERNATE ROW COLOR (optional but nice) */
tbody tr:nth-child(even) {
  background-color: #fcfcfc;
}

select {
  width: 100%;
  padding: 4px;
  margin-top: 4px;
}

/* hide default */
.dataTables_length,
.dataTables_paginate,
.dataTables_info {
  display: none;
}

#loading {
  padding: 20px;
  text-align: center;
  font-weight: bold;
}
  </style>
</head>

<body>

<!-- â CARD -->
<div class="card">
  <input type="text" id="search" placeholder="🔍 Search...">
  <div>Rows: <span id="count">0</span></div>
</div>

<!-- â LOADING -->
<div id="loading">Loading data...</div>

<!-- â TABLE -->
<div class="table-container">
  <table id="table">
    <thead>
      <tr id="header"></tr>   <!-- Title -->
      <tr id="filters"></tr>  <!-- Filter -->
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/12U0iM9kUZdB3nZmNNz9XmSNQqQ4jjPn927mvrB7-m9g/export?format=csv";

Papa.parse(url, {
  download: true,
  header: true,
  skipEmptyLines: true,

  complete: function(results) {

    let raw = results.data;

    if (!raw.length) {
      $('#loading').text("No data found");
      return;
    }

    // â CLEAN HEADER
    let cols = Object.keys(raw[0]).map((col, i) => {
      col = col.trim();
      if (!col) return "Column " + (i + 1);
      return col;
    });

    // â DATA CLEAN
    let data = raw.map(obj =>
      cols.map(c => obj[c] ? obj[c].split(" ")[0] : "")
    );

    // â REMOVE EMPTY COLUMN
    let validIndex = cols.map((col, i) =>
      data.some(row => row[i] !== "")
    );

    cols = cols.filter((_, i) => validIndex[i]);
    data = data.map(row => row.filter((_, i) => validIndex[i]));

    // â CREATE HEADER + FILTER ROW
    cols.forEach(col => {
      $('#header').append(`<th>${col}</th>`);
      $('#filters').append(`<th></th>`);
    });

    // â DATATABLE INIT (IMPORTANT FIX)
    let table = $('#table').DataTable({
      data: data,
      pageLength: 50,
      deferRender: true,
      dom: 'rt',
      orderCellsTop: true   // ð¥ header + filter fix
    });

    // â SEARCH
    $('#search').on('keyup', function () {
      table.search(this.value).draw();
    });

    // â FILTER (UNCHANGED LOGIC)
    $('#table thead tr:eq(1) th').each(function (i) {

      let select = $('<select><option value="">All</option></select>')
        .appendTo($(this))
        .on('change', function () {

          let val = $.fn.dataTable.util.escapeRegex($(this).val());

          table.column(i)
            .search(val ? '^' + val + '$' : '', true, false)
            .draw();
        });

      let unique = new Set();

      table.column(i).data().each(function (d) {
        if (d && !unique.has(d)) {
          unique.add(d);
          select.append(`<option value="${d}">${d}</option>`);
        }
      });

    });

    // â COUNT FIX
    function update() {
      $('#count').text(table.rows({ filter: 'applied' }).data().length);
    }

    update();
    table.on('draw', update);

    // â SHOW TABLE
    $('#loading').hide();
    $('.table-container').show();

  },

  error: function(err) {
    $('#loading').text("Error loading data");
    console.error(err);
  }

});

</script>

</body>
</html>
